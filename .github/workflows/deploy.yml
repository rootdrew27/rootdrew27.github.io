name: Deploy to GitHub Pages

on:
  # Trigger the workflow every time you push to the `master` branch.
  push:
    branches: [master]
  # Allow running this workflow manually from the Actions tab.
  workflow_dispatch:

# Allow this job to clone the repo and create a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Install, build, and upload the site
        uses: withastro/action@v3
        with:
          # Astro 6 requires Node >=22.12.0; the action defaults to Node 20.
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
